name: DevSecOps Pipeline
on:
  push:
    branches: [ main ]
jobs:
  secret-scanner:
      runs-on: ubuntu-latest
      steps:
        - name: checkout code
          uses: actions/checkout@v3  

        - name: Run Secret Scanner
          uses: gitleaks/gitleaks-action@v2
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}    